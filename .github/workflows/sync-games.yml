name: Sync Game Scores

on:
  schedule:
    # Run every 15 minutes during the active import/sync window.
    # This also covers the 3 PM Pacific NBA playoff preload window.
    - cron: '*/15 15-23 * * *'  # 3 PM - 11:59 PM UTC (10 AM - 7 PM ET)
    - cron: '*/15 0-7 * * *'    # 12 AM - 7 AM UTC (7 PM - 2 AM ET)
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY || vars.ODDS_API_KEY || vars.VITE_ODDS_API_KEY }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Validate sync environment
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing Supabase URL. Set secrets.SUPABASE_URL, vars.SUPABASE_URL, or vars.VITE_SUPABASE_URL."
            missing=1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing Supabase service role key. Set secrets.SUPABASE_SERVICE_ROLE_KEY or vars.SUPABASE_SERVICE_ROLE_KEY."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install

      - name: Sync game scores
        run: node scripts/daily-update.js
