name: Daily Game Update

on:
  schedule:
    # Runs daily at 15:00 UTC, which is 7:00 AM PST (Standard Time) or 8:00 AM PDT (Daylight Time)
    - cron: "0 15 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  update-games:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY || vars.ODDS_API_KEY || vars.VITE_ODDS_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Validate sync environment
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing Supabase URL. Set secrets.SUPABASE_URL, vars.SUPABASE_URL, or vars.VITE_SUPABASE_URL."
            missing=1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing Supabase service role key. Set secrets.SUPABASE_SERVICE_ROLE_KEY or vars.SUPABASE_SERVICE_ROLE_KEY."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install

      - name: Run update script
        run: node scripts/daily-update.js
